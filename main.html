<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Weather Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .glass {
            background: rgba(30, 27, 75, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sticky-pill {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #widget-container {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

    <!-- Widget Container: Increased width to 650px -->
    <div id="widget-container" class="relative flex flex-col rounded-[2.5rem] overflow-hidden glass shadow-2xl w-[650px] h-[850px] max-w-[95vw] max-h-[90vh]">
        
        <!-- Sticky Compact Header -->
        <div id="sticky-header" class="absolute top-0 left-0 right-0 z-[90] px-8 h-16 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-200">
            <div class="sticky-pill flex items-center gap-3 text-white font-medium px-6 py-2 rounded-full shadow-lg translate-y-4">
                <span id="sticky-name" class="text-sm font-bold">New York</span>
                <span class="text-white/40 font-thin">|</span>
                <span id="sticky-temp" class="text-sm font-bold">--°</span>
                <span class="text-white/40 font-thin">|</span>
                <span id="sticky-condition" class="text-sm font-medium">--</span>
                <span class="text-white/40 font-thin">|</span>
                <span id="sticky-hl" class="text-xs font-bold whitespace-nowrap">H:--° L:--°</span>
            </div>
        </div>

        <!-- Search & Controls -->
        <div class="absolute top-8 right-12 z-[100]">
            <button id="search-toggle" class="p-3 bg-white/10 rounded-full hover:bg-white/20 transition-all text-white shadow-lg border border-white/10">
                <i data-lucide="search" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Scrollable Content -->
        <div id="scroll-content" class="flex-1 overflow-y-auto px-8 pb-10 scrollbar-hide relative pt-12">
            
            <!-- Large Header -->
            <div id="large-header" class="flex flex-col items-center text-center mb-12 transition-all duration-75">
                <h1 class="text-5xl font-normal text-white flex items-center gap-4">
                    <span id="main-name">New York</span> <i data-lucide="navigation" class="w-6 h-6 fill-white"></i>
                </h1>
                <p id="main-temp" class="text-9xl font-thin text-white mt-6 -ml-1">--°</p>
                <p id="main-condition" class="text-3xl text-white/80 font-medium mt-2">--</p>
                <div class="flex gap-6 text-white font-medium mt-3 text-2xl">
                    <span id="main-high">H:--°</span>
                    <span id="main-low">L:--°</span>
                </div>
            </div>

            <!-- Dashboard Modules -->
            <div class="space-y-8">
                <!-- Hourly -->
                <div class="bg-black/20 rounded-[2.5rem] p-8 border border-white/5">
                    <div class="flex items-center gap-2 text-white/40 text-xs font-bold uppercase tracking-widest mb-6 border-b border-white/10 pb-4">
                        <i data-lucide="sun" class="w-4 h-4"></i> 24-Hour Forecast
                    </div>
                    <div id="hourly-list" class="flex gap-10 overflow-x-auto pb-2 scrollbar-hide">
                        <!-- Hourly items injected here -->
                    </div>
                </div>

                <!-- 7-Day -->
                <div class="bg-black/20 rounded-[2.5rem] p-8 border border-white/5">
                    <div class="flex items-center gap-2 text-white/40 text-xs font-bold uppercase tracking-widest mb-6 border-b border-white/10 pb-4">
                        <i data-lucide="calendar" class="w-4 h-4"></i> 7-Day Forecast
                    </div>
                    <div id="daily-list" class="space-y-6 text-white">
                        <!-- Daily items injected here -->
                    </div>
                </div>

                <!-- Grid Details -->
                <div class="grid grid-cols-2 gap-8">
                    <div class="bg-black/20 rounded-[2.5rem] p-8 border border-white/5 h-56 flex flex-col justify-between">
                        <div>
                            <div class="text-white/40 text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                                <i data-lucide="sun" class="w-4 h-4"></i> UV Index
                            </div>
                            <div id="uv-val" class="text-5xl text-white font-bold mt-6">--</div>
                            <div class="text-xl text-white font-semibold mt-2">Moderate</div>
                        </div>
                        <div class="w-full h-2 bg-white/10 rounded-full relative overflow-hidden mt-4">
                            <div id="uv-bar" class="h-full bg-gradient-to-r from-green-400 via-yellow-400 to-red-500" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="bg-black/20 rounded-[2.5rem] p-8 border border-white/5 h-56 flex flex-col justify-between">
                        <div class="flex justify-between items-start">
                            <div class="flex flex-col gap-1">
                                <div class="text-white/40 text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                                    <i data-lucide="sunset" class="w-4 h-4"></i> Sunset
                                </div>
                                <div id="sunset-val" class="text-4xl text-white font-bold mt-4">--:--</div>
                            </div>
                        </div>
                        <div id="sunrise-val" class="text-sm text-white/50 border-t border-white/5 pt-4 uppercase">
                            Sunrise: --:--
                        </div>
                    </div>

                    <div class="bg-black/20 rounded-[2.5rem] p-8 border border-white/5 h-56">
                        <div class="text-white/40 text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="wind" class="w-4 h-4"></i> Wind
                        </div>
                        <div class="flex items-center justify-between mt-8">
                            <i data-lucide="navigation" class="w-14 h-14 text-white fill-white rotate-45"></i>
                            <div class="text-right">
                                <div id="wind-val" class="text-5xl text-white font-bold">--</div>
                                <div class="text-xs text-white/40 font-bold uppercase">MPH</div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-black/20 rounded-[2.5rem] p-8 border border-white/5 h-56 flex flex-col justify-between">
                        <div>
                            <div class="text-white/40 text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                                <i data-lucide="droplets" class="w-4 h-4"></i> Humidity
                            </div>
                            <div id="humidity-val" class="text-5xl text-white font-bold mt-6">--%</div>
                        </div>
                        <div id="visibility-val" class="text-sm text-white/60 leading-tight">
                            Visibility: -- miles
                        </div>
                    </div>
                </div>

                <div class="text-center text-white/20 text-xs py-10">
                    Data from Open-Meteo • High Precision Forecast
                </div>
            </div>
        </div>

        <!-- Search Overlay -->
        <div id="search-overlay" class="hidden absolute inset-0 z-[110] bg-black/60 backdrop-blur-3xl p-12 animate-in fade-in">
            <div class="relative max-w-2xl mx-auto">
                <input id="search-input" type="text" placeholder="Search for a city..." class="w-full bg-white/10 border border-white/20 rounded-3xl px-16 py-6 text-white text-xl placeholder-white/40 focus:outline-none focus:ring-2 ring-white/20">
                <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 text-white/40 w-6 h-6"></i>
                <button id="search-close" class="absolute right-6 top-1/2 -translate-y-1/2 text-white/60 hover:text-white font-medium">Cancel</button>
            </div>
            <div id="search-results" class="mt-8 space-y-4 max-w-2xl mx-auto"></div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let state = {
            location: { name: 'New York', lat: 40.7143, lon: -74.006, tz: 'America/New_York' },
            weather: null
        };

        const WEATHER_CODES = {
            0: { label: 'Clear Sky', icon: 'sun', color: 'text-yellow-400' },
            1: { label: 'Mainly Clear', icon: 'sun', color: 'text-yellow-300' },
            2: { label: 'Partly Cloudy', icon: 'cloud', color: 'text-gray-200' },
            3: { label: 'Overcast', icon: 'cloud', color: 'text-gray-300' },
            45: { label: 'Fog', icon: 'cloud', color: 'text-blue-100' },
            61: { label: 'Rain', icon: 'cloud-rain', color: 'text-blue-400' },
            71: { label: 'Snow', icon: 'cloud-snow', color: 'text-white' },
            95: { label: 'Storm', icon: 'cloud-lightning', color: 'text-purple-400' },
        };

        const getInfo = code => WEATHER_CODES[code] || { label: 'Cloudy', icon: 'cloud', color: 'text-white' };

        // --- Core Functions ---
        async function fetchWeather() {
            const { lat, lon, tz } = state.location;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max,precipitation_probability_max&hourly=temperature_2m,weather_code,precipitation_probability&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,visibility&timezone=${encodeURIComponent(tz)}&temperature_unit=fahrenheit&wind_speed_unit=mph`;
            
            try {
                const res = await fetch(url);
                state.weather = await res.json();
                renderWeather();
            } catch (err) { console.error(err); }
        }

        function renderWeather() {
            const current = state.weather.current;
            const daily = state.weather.daily;
            const hourly = state.weather.hourly;
            const info = getInfo(current.weather_code);

            // Update Main UI
            document.getElementById('main-name').innerText = state.location.name;
            document.getElementById('sticky-name').innerText = state.location.name;
            document.getElementById('main-temp').innerText = `${Math.round(current.temperature_2m)}°`;
            document.getElementById('sticky-temp').innerText = `${Math.round(current.temperature_2m)}°`;
            document.getElementById('main-condition').innerText = info.label;
            document.getElementById('sticky-condition').innerText = info.label;
            document.getElementById('main-high').innerText = `H:${Math.round(daily.temperature_2m_max[0])}°`;
            document.getElementById('main-low').innerText = `L:${Math.round(daily.temperature_2m_min[0])}°`;
            document.getElementById('sticky-hl').innerText = `H:${Math.round(daily.temperature_2m_max[0])}° L:${Math.round(daily.temperature_2m_min[0])}°`;

            // Details
            document.getElementById('uv-val').innerText = Math.round(daily.uv_index_max[0]);
            document.getElementById('uv-bar').style.width = `${(daily.uv_index_max[0]/12)*100}%`;
            document.getElementById('wind-val').innerText = Math.round(current.wind_speed_10m);
            document.getElementById('humidity-val').innerText = `${current.relative_humidity_2m}%`;
            document.getElementById('visibility-val').innerText = `Visibility: ${Math.round(current.visibility/1609)} miles`;
            document.getElementById('sunset-val').innerText = new Date(daily.sunset[0]).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            document.getElementById('sunrise-val').innerText = `Sunrise: ${new Date(daily.sunrise[0]).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;

            // Hourly List
            const hourlyEl = document.getElementById('hourly-list');
            hourlyEl.innerHTML = '';
            for(let i=0; i<24; i++) {
                const hInfo = getInfo(hourly.weather_code[i]);
                const time = i === 0 ? 'Now' : new Date(hourly.time[i]).toLocaleTimeString([], { hour: 'numeric' }).split(' ')[0];
                hourlyEl.innerHTML += `
                    <div class="flex flex-col items-center min-w-[4rem] gap-5">
                        <span class="text-xs font-bold text-white uppercase opacity-60">${time}</span>
                        <i data-lucide="${hInfo.icon}" class="${hInfo.color} w-7 h-7"></i>
                        <span class="text-2xl font-bold text-white">${Math.round(hourly.temperature_2m[i])}°</span>
                    </div>
                `;
            }

            // Daily List
            const dailyEl = document.getElementById('daily-list');
            dailyEl.innerHTML = '';
            daily.time.forEach((day, i) => {
                const dInfo = getInfo(daily.weather_code[i]);
                const dayName = i === 0 ? 'Today' : new Date(day).toLocaleDateString('en-US', { weekday: 'short' });
                dailyEl.innerHTML += `
                    <div class="flex items-center text-lg">
                        <span class="w-20 font-semibold">${dayName}</span>
                        <div class="flex-1 flex justify-center">
                            <i data-lucide="${dInfo.icon}" class="${dInfo.color} w-7 h-7"></i>
                        </div>
                        <div class="flex items-center gap-6 min-w-[10rem] justify-end">
                            <span class="text-white/40 font-medium">${Math.round(daily.temperature_2m_min[i])}°</span>
                            <div class="w-32 h-1.5 bg-white/10 rounded-full relative overflow-hidden">
                                <div class="absolute inset-0 bg-gradient-to-r from-blue-400 to-yellow-300 opacity-40"></div>
                            </div>
                            <span class="font-bold">${Math.round(daily.temperature_2m_max[i])}°</span>
                        </div>
                    </div>
                `;
            });

            lucide.createIcons();
        }

        // --- Interaction Logic ---
        const scrollBox = document.getElementById('scroll-content');
        const stickyHeader = document.getElementById('sticky-header');
        const largeHeader = document.getElementById('large-header');

        scrollBox.addEventListener('scroll', () => {
            const top = scrollBox.scrollTop;
            const progress = Math.min(Math.max((top - 30) / 150, 0), 1);
            
            stickyHeader.style.opacity = progress;
            largeHeader.style.opacity = 1 - progress;
            largeHeader.style.transform = `scale(${1 - progress * 0.1}) translateY(${-top * 0.25}px)`;
        });

        // Search
        const searchOverlay = document.getElementById('search-overlay');
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        document.getElementById('search-toggle').onclick = () => searchOverlay.classList.remove('hidden');
        document.getElementById('search-close').onclick = () => searchOverlay.classList.add('hidden');

        searchInput.oninput = async (e) => {
            const q = e.target.value;
            if(q.length < 2) return searchResults.innerHTML = '';
            
            const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=5`);
            const data = await res.json();
            
            searchResults.innerHTML = (data.results || []).map(r => `
                <button onclick="selectCity('${r.name}', ${r.latitude}, ${r.longitude}, '${r.timezone}')" class="w-full flex items-center justify-between p-6 bg-white/5 hover:bg-white/10 transition-colors rounded-3xl text-white border border-white/5">
                    <div class="text-left">
                        <div class="text-xl font-bold">${r.name}</div>
                        <div class="text-sm text-white/40">${r.admin1 ? r.admin1 + ', ' : ''}${r.country}</div>
                    </div>
                    <i data-lucide="map-pin" class="w-5 h-5 text-white/40"></i>
                </button>
            `).join('');
            lucide.createIcons();
        };

        window.selectCity = (name, lat, lon, tz) => {
            state.location = { name, lat, lon, tz };
            searchOverlay.classList.add('hidden');
            searchInput.value = '';
            searchResults.innerHTML = '';
            scrollBox.scrollTop = 0;
            fetchWeather();
        };

        // Init
        fetchWeather();
        lucide.createIcons();
    </script>
</body>
</html>
